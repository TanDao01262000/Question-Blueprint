{% extends 'base_nav.html' %}
{% block title %} Profile
{% endblock title %}
{% block content %}


<section class="vh-100" style="background-color: #eee;">
  <div class="container py-5 h-100">
    <div class="row d-flex justify-content-center align-items-center h-100">
      <div class="col-md-12 col-xl-4">

        <div class="card" style="border-radius: 15px;">
          <div class="card-body text-center">
            <div class="mt-3 mb-4">
              <img src="{{ user.profile.image.url }}"
                class="rounded-circle img-fluid" style="width: 100px;" />
            </div>
            <h4 class="mb-2">{{ user1.username|title }}</h4>
            <a href="{% url 'profile_update' %}"><button type="button" class="btn btn-outline-primary">
                Update
              </button></a>
            <hr>
            <div class="mb-4 pb-2">
                <h4 class="mb-2">{{ user1.profile.bio }}</h4>
            </div>
            <hr>
            <div class="mb-4 pb-2">
                <h4 class="mb-2">{{ user1.email }}</h4>
            </div>

            <div class="mb-4 pb-2">
              <button type="button" class="btn btn-outline-primary btn-floating">
                <i class="fab fa-facebook-f fa-lg"></i>
              </button>
              <button type="button" class="btn btn-outline-primary btn-floating">
                <i class="fab fa-twitter fa-lg"></i>
              </button>
              <button type="button" class="btn btn-outline-primary btn-floating">
                <i class="fab fa-skype fa-lg"></i>
              </button>
            </div>
            <hr>
            <div class="d-flex justify-content-between text-center mt-5 mb-2">
              <div>
                <p class="mb-2 h5">{{question_count}}</p>
                <p class="text-muted mb-0">Questions</p>
              </div>
              <div class="px-3">
                <p class="mb-2 h5">???</p>
                <p class="text-muted mb-0">Answers</p>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</section>
{% endblock content %}
